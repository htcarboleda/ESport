# application-local.yml — Ticket Service
spring:
  config:
    activate:
      on-profile: local

r2dbc:
  host: localhost
  database: esport_database
  username: admin
  password: password

aws:
  sqs:
    ticket-queue-url: http://localhost:4566/000000000000/ticket-update-queue
  endpoint: http://localhost:4566

spring.cloud.aws:
  credentials:
    access-key: test
    secret-key: test
  region:
    static: us-east-1

spring.data.redis:
  host: redis
  password: redis_pass

app:
  async:
    rabbit-mq:
      host: rabbitmq
      port: 5672
      username: esport
      password: esport_pass
      virtual-host: /
