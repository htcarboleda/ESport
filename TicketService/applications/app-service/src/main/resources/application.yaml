server:
  port: 8085

spring:
  application:
    name: "TicketService"
  devtools:
    add-properties: false
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: 'health,prometheus,info,liveness,readiness'
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8080}

r2dbc:
  host: ${DB_HOST:localhost}
  port: ${DB_PORT:5432}
  database: ${DB_NAME:esport_database}
  username: ${DB_USER:admin}
  password: ${DB_PASS:password}

aws:
  region: ${AWS_REGION:us-east-1}
  endpoint: ${AWS_ENDPOINT_OVERRIDE:}        # vacío por defecto → cada perfil lo sobreescribe si hace falta
  dynamodb:
    audit-table: ${DYNAMODB_AUDIT_TABLE:esport-audit-trail}

logging:
  level:
    io.r2dbc: DEBUG
    io.awspring.cloud.sqs: DEBUG
    co.com.bancolombia: INFO

entrypoint:
  sqs:
    region: ${AWS_REGION:us-east-1}
    endpoint: ${AWS_ENDPOINT_OVERRIDE:}      # vacío por defecto → cada perfil lo sobreescribe si hace falta
    queue-url: ${AWS_SQS_TICKET_URL:http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/ticket-update-queue}
    wait-time-seconds: 20
    visibility-timeout-seconds: 30
    max-number-of-messages: 10
    number-of-threads: 1
    startup-delay-seconds: 15
