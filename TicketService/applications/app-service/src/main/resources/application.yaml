server:
  port: 8085

spring:
  application:
    name: "TicketService"
  devtools:
    add-properties: false
  profiles:
    active: local
    include: null

management:
  endpoints:
    web:
      exposure:
        include: 'health,prometheus,info'
  endpoint:
    health:
      probes:
        enabled: true

cors:
  allowed-origins: "http://localhost:4200,http://localhost:8085"

r2dbc:
  host: "${DB_HOST:localhost}"
  port: "${DB_PORT:5432}"
  database: "${DB_NAME:esport_database}"
  username: "${DB_USER:admin}"
  password: "${DB_PASS:password}"

aws:
  sqs:
    ticket-queue-url: "${AWS_SQS_TICKET_URL:http://localhost:4566/000000000000/ticket-update-queue}"
  dynamodb:
    audit-table: "esport-audit-trail"
    endpoint: "http://localhost:8000"
  region: "${AWS_REGION:us-east-1}"
  endpoint: "${AWS_ENDPOINT_OVERRIDE:}"

spring.data.redis:
  host: "${REDIS_HOST:localhost}"
  port: "${REDIS_PORT:6379}"
  password: "${REDIS_PASS:redis_pass}"

logging:
  level:
    io.r2dbc: "DEBUG"
    io.awspring.cloud.sqs: "DEBUG"
    co.com.bancolombia: "INFO"

entrypoint:
  sqs:
    region: "us-east-1"
    endpoint: "http://localhost:4566"
    queueUrl: "http://localhost:4566/000000000000/sample"
    waitTimeSeconds: 20
    maxNumberOfMessages: 10
    visibilityTimeoutSeconds: 10
    numberOfThreads: 1
