version: "3.8"

services:

  # ─── INFRAESTRUCTURA ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: esport-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SERVER_JVMFLAGS: "-Xmx128m -Xms64m"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper: { condition: service_healthy }
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://${EC2_HOST}:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 104857600
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_NUM_NETWORK_THREADS: 2
      KAFKA_NUM_IO_THREADS: 2
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 102400
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 102400
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ─── SERVICIOS DE NEGOCIO ──────────────────────────────────────

  tournament-service:
    build:
      context: ../../TournamentService
      dockerfile: deployment/Dockerfile
    image: esport-tournament:latest
    container_name: esport-tournament
    restart: unless-stopped
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      SPRING_PROFILES_ACTIVE: aws
      # Limitar heap en Free Tier
      JAVA_OPTS: "-Xmx200m -Xms100m"
      SPRING_R2DBC_URL: r2dbc:postgresql://${DB_HOST}:5432/${DB_NAME}?sslMode=require
      SPRING_R2DBC_USERNAME: ${DB_USER}
      SPRING_R2DBC_PASSWORD: ${DB_PASS}
      SPRING_KAFKA_BOOTSTRAPSERVERS: kafka:29092
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PASS: ${REDIS_PASS}
      REDIS_PORT: ${REDIS_PORT}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AWS_REGION: ${AWS_REGION}
      AWS_SNS_TOURNAMENT_ARN: ${AWS_SNS_TOURNAMENT_ARN}
      AWS_ENDPOINT_OVERRIDE: ${AWS_ENDPOINT_OVERRIDE}
      DYNAMODB_AUDIT_TABLE: ${DYNAMODB_AUDIT_TABLE}
    ports:
      - "9097:9097"
    depends_on:
      kafka: { condition: service_healthy }
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /esport/tournament-service
        awslogs-create-group: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9097/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 150s

  ticket-service:
    build:
      context: ../../TicketService
      dockerfile: deployment/Dockerfile
    image: esport-ticket:latest
    container_name: esport-ticket
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: aws
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      # Limitar heap en Free Tier
      JAVA_OPTS: "-Xmx200m -Xms100m"
      SPRING_KAFKA_BOOTSTRAPSERVERS: kafka:29092
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AWS_REGION: ${AWS_REGION}
      AWS_SQS_TICKET_URL: ${AWS_SQS_TICKET_URL}
      AWS_ENDPOINT_OVERRIDE: ${AWS_ENDPOINT_OVERRIDE}
      DYNAMODB_AUDIT_TABLE: ${DYNAMODB_AUDIT_TABLE}
    ports:
      - "8085:8085"
    depends_on:
      kafka: { condition: service_healthy }
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /esport/ticket-service
        awslogs-create-group: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health/liveness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s


volumes:
  zookeeper_data:
  zookeeper_logs:
  kafka_data: