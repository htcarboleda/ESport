# ── Perfil LOCAL — Docker Compose / LocalStack ────────────────────
spring:
  config:
    activate:
      on-profile: local
  cloud:
    aws:
      credentials:
        access-key: test
        secret-key: test
      region:
        static: us-east-1
      sns:
        endpoint: http://localhost:4566

# ── Base de datos local ───────────────────────────────────────────
r2dbc:
  host: ${DB_HOST:localhost}
  port: ${DB_PORT:5432}
  database: ${DB_NAME:esport_database}
  username: ${DB_USER:admin}
  password: ${DB_PASS:password}

# ── AWS apunta a LocalStack ───────────────────────────────────────
aws:
  region: us-east-1
  endpoint: http://localhost:4566
  sns:
    tournament-events-arn: arn:aws:sns:us-east-1:000000000000:tournament-events

# ── Logging más verboso para desarrollo ──────────────────────────
logging:
  level:
    root: INFO
    co.com.bancolombia: DEBUG
    io.r2dbc: DEBUG
    org.springframework.r2dbc: DEBUG
    org.springframework.data.r2dbc: DEBUG
