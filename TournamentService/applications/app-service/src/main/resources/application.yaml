server:
  port: 9097
spring:
  application:
    name: "TournamentService"
  devtools:
    add-properties: false
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:redis_pass}
      timeout: 2000ms
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8080}"
r2dbc:
  host: "${DB_HOST:localhost}"
  port: "${DB_PORT:5432}"
  database: "${DB_NAME:esport_database}"
  username: "${DB_USER:admin}"
  password: "${DB_PASS:password}"
aws:
  region: "${AWS_REGION:us-east-1}"
  endpoint: "${AWS_ENDPOINT_OVERRIDE:}"
  sns:
    tournament-events-arn: "${AWS_SNS_TOURNAMENT_ARN:arn:aws:sns:us-east-1:000000000000:tournament-events}"
  dynamodb:
    audit-table: "${DYNAMODB_AUDIT_TABLE:esport-audit-trail}"
    endpoint: "http://localhost:8000"
logging:
  level:
    root: "INFO"
    co.com.bancolombia: "INFO"
app:
  async:
    direct-async-gateway:
      enabled: true
