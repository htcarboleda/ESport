# application-aws.yml — Tournament Service (AWS real con free tier)
spring:
  config:
    activate:
      on-profile: aws
  cloud:
    aws:
      credentials:
        instance-profile: true    # usa el rol IAM del EC2/ECS directamente
      region:
        static: us-east-1

# ── RDS PostgreSQL en AWS ─────────────────────────────────────────
r2dbc:
  host: ${DB_HOST}
  port: ${DB_PORT:5432}
  database: ${DB_NAME}
  username: ${DB_USER}
  password: ${DB_PASS}

# ── AWS real (sin endpoint override → apunta a AWS directamente) ──
aws:
  region: us-east-1
  endpoint: ""                    # vacío = AWS real
  sns:
    tournament-events-arn: ${AWS_SNS_TOURNAMENT_ARN}
